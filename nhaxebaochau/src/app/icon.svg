<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <rect width="100" height="100" rx="16" fill="#ffffff"/>
  <!-- Car body -->
  <path d="M15 58 L15 70 Q15 74 19 74 L23 74 Q23 70 27 70 L73 70 Q77 70 77 74 L81 74 Q85 74 85 70 L85 58 L78 58 L72 42 Q70 36 64 36 L36 36 Q30 36 28 42 L22 58 Z"
        stroke="#00829a" stroke-width="3.5" stroke-linejoin="round" fill="none"/>
  <!-- Windshield -->
  <path d="M32 58 L37 44 Q38.5 40 42 40 L58 40 Q61.5 40 63 44 L68 58 Z"
        stroke="#00829a" stroke-width="3" stroke-linejoin="round" fill="rgba(0,130,154,0.08)"/>
  <!-- Left wheel -->
  <circle cx="30" cy="74" r="9" stroke="#00829a" stroke-width="3.5" fill="white"/>
  <circle cx="30" cy="74" r="4" fill="#00829a"/>
  <!-- Right wheel -->
  <circle cx="70" cy="74" r="9" stroke="#00829a" stroke-width="3.5" fill="white"/>
  <circle cx="70" cy="74" r="4" fill="#00829a"/>
  <!-- Headlights -->
  <rect x="16" y="60" width="8" height="4" rx="2" fill="#00829a"/>
  <rect x="76" y="60" width="8" height="4" rx="2" fill="#00829a"/>
  <!-- Door line -->
  <line x1="50" y1="40" x2="50" y2="58" stroke="#00829a" stroke-width="2.5" stroke-linecap="round"/>
</svg>
